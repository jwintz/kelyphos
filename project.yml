name: Kelyphos
options:
  bundleIdPrefix: com.syntropment.kelyphos
  deploymentTarget:
    macOS: "26.0"
    iOS: "26.0"
  xcodeVersion: "26.0"
  generateEmptyDirectories: false
  createIntermediateGroups: true
  defaultConfig: Debug

settings:
  base:
    SWIFT_VERSION: "6.0"
    MACOSX_DEPLOYMENT_TARGET: "26.0"
    IPHONEOS_DEPLOYMENT_TARGET: "26.0"
    DEVELOPMENT_TEAM: H4T77W7K9A
    CODE_SIGN_STYLE: Automatic

packages:
  WelcomeWindow:
    url: https://github.com/CodeEditApp/WelcomeWindow.git
    from: "1.1.0"
  AboutWindow:
    url: https://github.com/CodeEditApp/AboutWindow.git
    from: "1.0.1"

targets:
  KelyphosDemo:
    type: application
    supportedDestinations: [macOS, iOS]
    sources:
      - Sources/KelyphosDemo
      - path: Kelyphos.icon
        buildPhase: resources
    dependencies:
      - target: KelyphosKit
        embed: true
        codeSign: true
      - target: KelyphosWidget
        embed: true
        codeSign: true
      - package: WelcomeWindow
        destinationFilters: [macOS]
      - package: AboutWindow
        destinationFilters: [macOS]
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: me.jwintz.kelyphos.demo
        PRODUCT_NAME: KelyphosDemo
        GENERATE_INFOPLIST_FILE: true
        CODE_SIGN_ENTITLEMENTS: Sources/KelyphosDemo/KelyphosDemo.entitlements
        CURRENT_PROJECT_VERSION: 1
        MARKETING_VERSION: "1.0"
        ASSETCATALOG_COMPILER_APPICON_NAME: Kelyphos
        INFOPLIST_KEY_CFBundleIconName: Kelyphos
        LD_RUNPATH_SEARCH_PATHS: "$(inherited) @executable_path/../Frameworks @executable_path/Frameworks"
        "INFOPLIST_KEY_UILaunchScreen_Generation[sdk=iphoneos*]": true
        "INFOPLIST_KEY_UILaunchScreen_Generation[sdk=iphonesimulator*]": true
        "INFOPLIST_KEY_UISupportedInterfaceOrientations_iPad[sdk=iphoneos*]": "UIInterfaceOrientationPortrait UIInterfaceOrientationPortraitUpsideDown UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
        "INFOPLIST_KEY_UISupportedInterfaceOrientations_iPad[sdk=iphonesimulator*]": "UIInterfaceOrientationPortrait UIInterfaceOrientationPortraitUpsideDown UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"

  KelyphosKit:
    type: framework
    supportedDestinations: [macOS, iOS]
    sources:
      - Sources/KelyphosKit
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: me.jwintz.kelyphos.kit
        PRODUCT_NAME: KelyphosKit
        GENERATE_INFOPLIST_FILE: true

  KelyphosKitTests:
    type: bundle.unit-test
    supportedDestinations: [macOS]
    sources:
      - Tests/KelyphosKitTests
    dependencies:
      - target: KelyphosKit
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: me.jwintz.kelyphos.kit.tests
        GENERATE_INFOPLIST_FILE: true

  KelyphosWidget:
    type: app-extension
    supportedDestinations: [macOS, iOS]
    sources:
      - Sources/KelyphosWidget
    dependencies:
      - sdk: WidgetKit.framework
      - sdk: SwiftUI.framework
    info:
      path: Sources/KelyphosWidget/Info.plist
      properties:
        CFBundleDisplayName: KelyphosWidget
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: me.jwintz.kelyphos.demo.widget
        PRODUCT_NAME: KelyphosWidget
        GENERATE_INFOPLIST_FILE: false
        CODE_SIGN_ENTITLEMENTS: Sources/KelyphosWidget/KelyphosWidget.entitlements
        CURRENT_PROJECT_VERSION: 1
        MARKETING_VERSION: "1.0"
        SKIP_INSTALL: YES
        APPLICATION_EXTENSION_API_ONLY: YES
        DEAD_CODE_STRIPPING: NO
        LD_RUNPATH_SEARCH_PATHS: "$(inherited) @executable_path/../Frameworks @executable_path/../../../../Frameworks"

schemes:
  KelyphosDemo:
    build:
      targets:
        KelyphosDemo: all
        KelyphosWidget: all
        KelyphosKitTests: [test]
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - KelyphosKitTests
  KelyphosWidget:
    build:
      targets:
        KelyphosWidget: all
        KelyphosDemo: all
    run:
      config: Debug
      executable: KelyphosDemo
