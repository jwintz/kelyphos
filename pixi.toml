[workspace]
name = "kelyphos"
version = "0.1.0"
description = "A SwiftUI shell framework for macOS and iPadOS apps"
channels = ["conda-forge"]
platforms = ["osx-arm64", "osx-64"]

[tasks]
# Force-regenerate the Xcode project from project.yml (always runs XcodeGen).
generate = "swift run xcodegen generate --spec project.yml"

# Regenerate only when project.yml is newer than the generated project.pbxproj.
generate-if-needed = "bash -c 'test Kelyphos.xcodeproj/project.pbxproj -nt project.yml || swift run xcodegen generate --spec project.yml'"

# Always build (use for forced rebuild).
build = { cmd = "xcodebuild -project Kelyphos.xcodeproj -scheme KelyphosDemo -configuration Debug build -allowProvisioningUpdates", depends-on = ["generate-if-needed"], env = { SDKROOT = "/Applications/Xcode.app/Contents/Developer/Platforms/MacOSX.platform/Developer/SDKs/MacOSX.sdk" } }

# Build only when sources, project, or resources are newer than the built binary.
build-if-needed = { cmd = "bash -c 'BUILT=$(xcodebuild -project Kelyphos.xcodeproj -scheme KelyphosDemo -configuration Debug -showBuildSettings 2>/dev/null | grep BUILT_PRODUCTS_DIR | sed \"s/.*= //\" | head -n 1); BIN=\"$BUILT/KelyphosDemo.app/Contents/MacOS/KelyphosDemo\"; if [ -f \"$BIN\" ] && [ -z \"$(find Sources project.yml Kelyphos.xcodeproj/project.pbxproj -newer \"$BIN\" 2>/dev/null | head -1)\" ]; then echo \"Build up to date.\"; else xcodebuild -project Kelyphos.xcodeproj -scheme KelyphosDemo -configuration Debug build -allowProvisioningUpdates; fi'", depends-on = ["generate-if-needed"], env = { SDKROOT = "/Applications/Xcode.app/Contents/Developer/Platforms/MacOSX.platform/Developer/SDKs/MacOSX.sdk" } }

# Run unit tests.
test = { cmd = "xcodebuild -project Kelyphos.xcodeproj -scheme KelyphosDemo -configuration Debug test -allowProvisioningUpdates -destination 'platform=macOS'", depends-on = ["generate-if-needed"], env = { SDKROOT = "/Applications/Xcode.app/Contents/Developer/Platforms/MacOSX.platform/Developer/SDKs/MacOSX.sdk" } }

# Build if needed, launch app.
# Note: uses open -a with the bundle path instead of open -W because
# -W cannot track sandboxed app PIDs (GetProcessPID fails).
run = { cmd = "bash -c 'BUILT=$(xcodebuild -project Kelyphos.xcodeproj -scheme KelyphosDemo -configuration Debug -showBuildSettings 2>/dev/null | grep \" BUILT_PRODUCTS_DIR = \" | sed \"s/.*= //\" | head -n 1); open \"$BUILT/KelyphosDemo.app\"'", depends-on = ["build-if-needed"], env = { SDKROOT = "/Applications/Xcode.app/Contents/Developer/Platforms/MacOSX.platform/Developer/SDKs/MacOSX.sdk" } }

# Remove all build artifacts, derived data, and generated project for a pristine rebuild.
distclean = "rm -rf .build Kelyphos.xcodeproj DerivedData build && xcodebuild -alltargets clean 2>/dev/null; echo 'distclean complete'"
